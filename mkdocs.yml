site_name: didactic
site_description: A typed-data library on top of panproto. Models, lenses, migrations, version control, multi-format codegen.
site_url: https://panproto.dev/didactic/
repo_url: https://github.com/panproto/didactic
repo_name: panproto/didactic
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.tabs
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/didactic/src
            - packages/didactic-pydantic/src
            - packages/didactic-settings/src
            - packages/didactic-fastapi/src
          options:
            docstring_style: numpy
            docstring_section_style: table
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            signature_crossrefs: true
            merge_init_into_class: true
            inherited_members: false
            members_order: source
            filters:
              - "!^_"
              - "^__init__$"

nav:
  - Home: index.md
  - Tutorial:
